name: restart
on:
  schedule:
    - cron: '5 */12 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract Docker authentication
        run: |
          mkdir .docker
          echo "${{ secrets.DOCKER_KEY }}" >> .docker/key.pem
          echo "${{ secrets.DOCKER_CERT }}" >> .docker/cert.pem
          echo "${{ secrets.DOCKER_CA }}" >> .docker/ca.pem
      # - name: Restart the processes (x64)
      #   run: docker compose -p vgmdbapi restart vgmdb_web && docker compose -p vgmdbapi restart vgmdb_celery
      #   env:
      #     DOCKER_CERT_PATH: .docker
      #     DOCKER_HOST: "${{ secrets.DOCKER_HOST }}"
      #     DOCKER_TLS_VERIFY: 1
      - name: Restart the processes (arm)
        run: docker pull hufman/vgmdb_cache:latest && docker compose -p vgmdbapi down vgmdb_web && docker compose -p vgmdbapi down vgmdb_celery && docker compose -p vgmdbapi up -d vgmdb_web --force-recreate && docker compose -p vgmdbapi up -d vgmdb_celery --force-recreate
        env:
          DOCKER_CERT_PATH: .docker
          DOCKER_HOST: "${{ secrets.DOCKER_HOST_2 }}"
          DOCKER_TLS_VERIFY: 1
          VIRTUAL_HOST: vgmdb.info
          VIRTUAL_PORT: 80
          LETSENCRYPT_HOST: vgmdb.info
          SEARCH_INDEX: "true"
          STATSD_HOST: "dsig-telegraf"
          AMAZON_ACCESS_KEY_ID: "${{ secrets.AMAZON_ACCESS_KEY_ID }}"
          AMAZON_SECRET_ACCESS_KEY: "${{ secrets.AMAZON_SECRET_ACCESS_KEY }}"
          AMAZON_ASSOCIATE_TAG: "${{ secrets.AMAZON_ASSOCIATE_TAG }}"
          ITUNES_AFFILIATE_ID: "${{ secrets.ITUNES_AFFILIATE_ID }}"
          DISCOGS_KEY: "${{ secrets.DISCOGS_KEY }}"
          DISCOGS_SECRET: "${{ secrets.DISCOGS_SECRET }}"
          SPOTIFY_ID: "${{ secrets.SPOTIFY_ID }}"
          SPOTIFY_SECRET: "${{ secrets.SPOTIFY_SECRET }}"
          USER_COOKIE: "${{ secrets.USER_COOKIE }}"
